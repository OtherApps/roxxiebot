        // Initialize App
        function init() {
            const saved = localStorage.getItem('scoreboardData');
            if (saved) {
                gameState = JSON.parse(saved);
            }
            render();

        function updateScore(team, points) {
			console.log(points);
			
		
            gameState[team].score = parseInt(gameState[team].score) +parseInt(points);
            
			if (gameState[team].score < 0) gameState[team].score = 000;
            saveAndRender();
        }

        function resetGame() {
            if (confirm("Reset scores to zero?")) {
                gameState.home.score = 000;
                gameState.guest.score = 000;
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('scoreboardData', JSON.stringify(gameState));
            render();
        }

        function render() {
            // Update Scores
            document.getElementById('home-score').textContent = gameState.home.score;

            renderRoster('home-roster', gameState.home.members);

function timeConverter(UNIX_timestamp){
  var a = new Date(UNIX_timestamp * 1000);
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var year = a.getFullYear();
  var month = months[a.getMonth()];
  var date = a.getDate();
  var hour = a.getHours();
  var min = a.getMinutes();
  var sec = a.getSeconds();
  if(sec <10 ){
	sec ="0"+sec

  }
  if(hour <10) {
	hour = "0" + hour;

  }
  if(min <10){
	min = "0" + min

  }
  var time =   hour + ':' + min ;
  return time;
}
